name: MacOS & Linux Build

on:
  workflow_call:
    inputs:
      platform:
        description: 'Platform identifier'
        required: true
        type: string
      os:
        description: 'GitHub Actions runner OS'
        required: true
        type: string
      compiler:
        description: 'C++ compiler to use (gcc or clang)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (${{ inputs.platform }})
    runs-on: ${{ inputs.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ${{ inputs.os }}
            platform: ${{ inputs.platform }}
            arch_flag: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        if: ${{ !contains(inputs.os, 'riscv') }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Select Python on RISC-V
        if: ${{ contains(inputs.os, 'riscv') }}
        run: |
          python3.10 --version
          echo "PYTHON=python3.10" >> $GITHUB_ENV
        shell: bash

      - name: Select Python on non-RISC-V
        if: ${{ !contains(inputs.os, 'riscv') }}
        run: |
          python --version
          echo "PYTHON=python" >> $GITHUB_ENV
        shell: bash

      - name: Install Clang
        if: inputs.compiler == 'clang' && runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang libomp-dev
        shell: bash

      - name: Print CPU info
        if: runner.os == 'Linux'
        run: lscpu
        shell: bash

      - name: Set up environment variables
        run: |
          if [[ "${{ matrix.platform }}" == "macos-arm64" ]]; then
            NPROC=$(sysctl -n hw.ncpu 2>/dev/null || echo 2)
          else
            NPROC=$(nproc 2>/dev/null || echo 2)
          fi
          echo "NPROC=$NPROC" >> $GITHUB_ENV
          echo "Using $NPROC parallel jobs for builds"

          if [[ "${{ inputs.compiler }}" == "clang" ]]; then
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          fi

          echo "$($PYTHON -c 'import site; print(site.USER_BASE)')/bin" >> $GITHUB_PATH
        shell: bash

      - name: Get pip cache dir
        if: ${{ contains(inputs.os, 'riscv') }}
        id: pip-cache
        run: |
          echo "dir=$($PYTHON -m pip cache dir)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache pip dependencies for RISC-V
        if: ${{ contains(inputs.os, 'riscv') }}
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-riscv-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-riscv-pip-

      - name: Install dependencies
        run: |
          $PYTHON -m pip install --upgrade pip          
          DEPS="pybind11==3.0 cmake==3.30.0 ninja==1.11.1 pytest scikit-build-core setuptools_scm"
          
          if [[ "${{ inputs.os }}" == *"riscv"* ]]; then
            echo "RISC-V architecture detected. Adding build tools for compiling numpy from source..."
            DEPS="$DEPS meson-python meson Cython"
          fi
          
          $PYTHON -m pip install $DEPS
        shell: bash

      - name: Build from source
        run: |
          cd "$GITHUB_WORKSPACE"

          CMAKE_GENERATOR="Unix Makefiles" \
          CMAKE_BUILD_PARALLEL_LEVEL="$NPROC" \
          $PYTHON -m pip install -v . \
            --no-build-isolation \
            --config-settings='cmake.define.BUILD_TOOLS="ON"' \
            ${{ matrix.arch_flag }}
        shell: bash

      - name: Run C++ Tests
        run: |
          cd "$GITHUB_WORKSPACE/build"
          make unittest -j$NPROC
        shell: bash

      - name: Run Python Tests
        run: |
          cd "$GITHUB_WORKSPACE"
          $PYTHON -m pytest python/tests/
        shell: bash

      - name: Run C++ Examples
        run: |
          cd "$GITHUB_WORKSPACE/examples/c++"
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j $NPROC
          ./db-example
          ./core-example
          ./ailego-example
        shell: bash

      - name: Run C Examples
        run: |
          cd "$GITHUB_WORKSPACE/examples/c"
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j $NPROC
          ./c_api_basic_example
          ./c_api_collection_schema_example
          ./c_api_doc_example
          ./c_api_field_schema_example
          ./c_api_index_example
          ./c_api_optimized_example
        shell: bash